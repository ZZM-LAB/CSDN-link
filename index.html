<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>InSAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .menu {
            padding: 30px;
            text-align: center;
            background: #eeeeee;
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            margin: 0 10px;
            font-size: 18px;
            background: #007bff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<!-- 只有两个按钮 -->
<div class="menu">
    <div class="btn" onclick="showImage()">雷达干涉测量杂谈一</div>
    <div class="btn" onclick="openPdf()">微波遥感杂谈一</div>
</div>

<script>
// 点击显示图片
function showImage() {
    // 先清空页面内容
    document.body.innerHTML = `
    <div class="menu">
        <div class="btn" onclick="showImage()">雷达干涉测量杂谈一</div>
        <div class="btn" onclick="openPdf()">微波遥感杂谈一</div>
    </div>
    <img src="INSAR.jpg" style="width:100%">
    `;
}

// 点击打开PDF
function openPdf() {
    window.open("https://github.com/ZZM-LAB/CSDN-link/raw/main/%E6%89%AB%E6%8F%8F%E4%BB%B6_%E5%BE%AE%E6%B3%A2%E9%81%A5%E6%84%9F%E5%8E%9F%E7%90%86.pdf", "_blank");
}
</script>

</body>
</html>
